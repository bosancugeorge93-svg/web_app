<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Monthly Cost Management Apps</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js for interactive graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- React & ReactDOM for application logic -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel to compile React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Configuration for Custom Turquoise Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        turquoise: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6', // Base Turquoise
                            600: '#0d9488', // Darker Turquoise for buttons
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f0fdfa; /* Light turquoise tint background */
            color: #334155;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #2dd4bf; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0d9488; }
        
        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utility Functions ---
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('ro-RO', { 
                style: 'currency', 
                currency: 'RON',
                maximumFractionDigits: 0
            }).format(amount);
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- Reusable Chart Component ---
        const ChartComponent = ({ type, data, options }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: type,
                    data: data,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        ...options
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [data, type, options]);

            return <canvas ref={chartRef} />;
        };

        // --- Main Application Component ---
        const App = () => {
            // State initialization (with localStorage persistence)
            const loadData = (key, defaultData) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultData;
                } catch (e) {
                    return defaultData;
                }
            };

            const [incomes, setIncomes] = useState(() => loadData('fmcm_incomes', []));
            const [expenses, setExpenses] = useState(() => loadData('fmcm_expenses', []));
            const [savingsGoal, setSavingsGoal] = useState(() => loadData('fmcm_goal', 2000));
            const [activeTab, setActiveTab] = useState('dashboard');

            // Save to local storage whenever data changes
            useEffect(() => {
                try {
                    localStorage.setItem('fmcm_incomes', JSON.stringify(incomes));
                    localStorage.setItem('fmcm_expenses', JSON.stringify(expenses));
                    localStorage.setItem('fmcm_goal', JSON.stringify(savingsGoal));
                } catch (e) {
                    console.warn("Could not save to localStorage");
                }
            }, [incomes, expenses, savingsGoal]);

            // Calculated Values
            const totalIncome = incomes.reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalExpenses = expenses.reduce((acc, curr) => acc + Number(curr.amount), 0);
            const savedAmount = totalIncome - totalExpenses;
            const savingsRate = totalIncome > 0 ? ((savedAmount / totalIncome) * 100).toFixed(1) : 0;
            const goalProgress = savingsGoal > 0 ? Math.min((savedAmount / savingsGoal) * 100, 100).toFixed(1) : 0;

            // --- Handlers ---
            const addIncome = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newIncome = {
                    id: generateId(),
                    source: formData.get('source'),
                    amount: Number(formData.get('amount')),
                    category: formData.get('category'),
                    type: formData.get('type')
                };
                setIncomes([...incomes, newIncome]);
                e.target.reset();
            };

            const deleteIncome = (id) => setIncomes(incomes.filter(i => i.id !== id));

            const addExpense = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newExpense = {
                    id: generateId(),
                    name: formData.get('name'),
                    amount: Number(formData.get('amount')),
                    category: formData.get('category'),
                    method: formData.get('method'),
                    dueDate: formData.get('dueDate'),
                    reminder: formData.get('reminder') === 'on'
                };
                setExpenses([...expenses, newExpense]);
                e.target.reset();
            };

            const deleteExpense = (id) => setExpenses(expenses.filter(e => e.id !== id));

            // --- Chart Data Generators ---
            const getExpenseCategoryData = () => {
                const categories = {};
                expenses.forEach(e => {
                    categories[e.category] = (categories[e.category] || 0) + e.amount;
                });
                return {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: ['#14b8a6', '#0ea5e9', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'],
                        borderWidth: 0
                    }]
                };
            };

            const getOverviewChartData = () => {
                return {
                    labels: ['Monthly Overview'],
                    datasets: [
                        { label: 'Income', data: [totalIncome], backgroundColor: '#14b8a6' },
                        { label: 'Expenses', data: [totalExpenses], backgroundColor: '#ef4444' },
                        { label: 'Savings', data: [savedAmount > 0 ? savedAmount : 0], backgroundColor: '#3b82f6' }
                    ]
                };
            };

            // --- Views ---
            const DashboardView = () => (
                <div className="space-y-6 animate-fade-in">
                    {/* Top Summary Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-turquoise-100 flex items-center justify-between">
                            <div>
                                <p className="text-sm text-gray-500 font-medium mb-1">Total Income</p>
                                <h3 className="text-2xl font-bold text-gray-800">{formatMoney(totalIncome)}</h3>
                            </div>
                            <div className="h-12 w-12 rounded-full bg-turquoise-100 text-turquoise-600 flex items-center justify-center text-xl">
                                <i className="fa-solid fa-arrow-down"></i>
                            </div>
                        </div>
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-red-100 flex items-center justify-between">
                            <div>
                                <p className="text-sm text-gray-500 font-medium mb-1">Total Expenses</p>
                                <h3 className="text-2xl font-bold text-gray-800">{formatMoney(totalExpenses)}</h3>
                            </div>
                            <div className="h-12 w-12 rounded-full bg-red-100 text-red-500 flex items-center justify-center text-xl">
                                <i className="fa-solid fa-arrow-up"></i>
                            </div>
                        </div>
                        <div className="bg-turquoise-600 rounded-2xl p-6 shadow-md text-white flex items-center justify-between">
                            <div>
                                <p className="text-sm text-turquoise-100 font-medium mb-1">Savings Rate</p>
                                <h3 className="text-3xl font-bold">{savingsRate}%</h3>
                                <p className="text-sm mt-1">{formatMoney(savedAmount)} saved</p>
                            </div>
                            <div className="h-12 w-12 rounded-full bg-white/20 flex items-center justify-center text-xl">
                                <i className="fa-solid fa-piggy-bank"></i>
                            </div>
                        </div>
                    </div>

                    {/* Savings Goal Section */}
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-4">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">Monthly Savings Goal</h3>
                                <p className="text-sm text-gray-500">Track your progress towards your target</p>
                            </div>
                            <div className="mt-4 md:mt-0 flex items-center gap-2">
                                <span className="text-sm text-gray-500">Goal:</span>
                                <input 
                                    type="number" 
                                    value={savingsGoal}
                                    onChange={(e) => setSavingsGoal(Number(e.target.value))}
                                    className="border border-gray-300 rounded-lg px-3 py-1 w-32 focus:outline-none focus:ring-2 focus:ring-turquoise-500 font-semibold"
                                />
                                <span className="text-sm text-gray-500">RON</span>
                            </div>
                        </div>
                        <div className="w-full bg-gray-100 rounded-full h-4 mb-2 overflow-hidden">
                            <div className="bg-turquoise-500 h-4 rounded-full transition-all duration-1000" style={{ width: `${goalProgress}%` }}></div>
                        </div>
                        <p className="text-sm text-right font-medium text-gray-600">{goalProgress}% Achieved</p>
                    </div>

                    {/* Charts Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Financial Overview</h3>
                            <div className="h-64 relative w-full">
                                <ChartComponent 
                                    type="bar" 
                                    data={getOverviewChartData()} 
                                    options={{ plugins: { legend: { position: 'bottom' } } }} 
                                />
                            </div>
                        </div>
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Expenses by Category</h3>
                            <div className="h-64 relative w-full">
                                {expenses.length > 0 ? (
                                    <ChartComponent 
                                        type="doughnut" 
                                        data={getExpenseCategoryData()} 
                                        options={{ plugins: { legend: { position: 'right' } }, cutout: '70%' }} 
                                    />
                                ) : (
                                    <div className="flex items-center justify-center h-full text-gray-400">
                                        No expenses recorded yet.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const IncomeView = () => (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="lg:col-span-1">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 sticky top-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Add New Income</h3>
                            <form onSubmit={addIncome} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Source Name</label>
                                    <input required name="source" type="text" placeholder="e.g., Main Salary" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Amount (RON)</label>
                                    <input required name="amount" type="number" min="0" step="1" placeholder="0" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                    <select name="category" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500 bg-white">
                                        <option value="Salary">Salary</option>
                                        <option value="Business">Business</option>
                                        <option value="Investments">Investments</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Stream Type</label>
                                    <div className="flex gap-4 mt-2">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="type" value="Main" defaultChecked className="text-turquoise-600 focus:ring-turquoise-500" />
                                            <span className="text-sm">Main</span>
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="type" value="Secondary" className="text-turquoise-600 focus:ring-turquoise-500" />
                                            <span className="text-sm">Secondary</span>
                                        </label>
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-turquoise-600 hover:bg-turquoise-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200 mt-2">
                                    <i className="fa-solid fa-plus mr-2"></i> Save Income
                                </button>
                            </form>
                        </div>
                    </div>
                    <div className="lg:col-span-2">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex justify-between items-center">
                                Income Streams
                                <span className="bg-turquoise-100 text-turquoise-700 py-1 px-3 rounded-full text-sm">{formatMoney(totalIncome)} Total</span>
                            </h3>
                            {incomes.length === 0 ? (
                                <div className="text-center py-10 text-gray-500">No income streams added yet.</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-gray-200 text-gray-500 text-sm">
                                                <th className="pb-3 font-medium">Source</th>
                                                <th className="pb-3 font-medium">Category</th>
                                                <th className="pb-3 font-medium">Type</th>
                                                <th className="pb-3 font-medium text-right">Amount</th>
                                                <th className="pb-3 font-medium text-center">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {incomes.map(inc => (
                                                <tr key={inc.id} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                                    <td className="py-4 font-medium text-gray-800">{inc.source}</td>
                                                    <td className="py-4 text-sm text-gray-600">{inc.category}</td>
                                                    <td className="py-4">
                                                        <span className={`text-xs px-2 py-1 rounded-md ${inc.type === 'Main' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                                                            {inc.type}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 text-right font-semibold text-turquoise-600">{formatMoney(inc.amount)}</td>
                                                    <td className="py-4 text-center">
                                                        <button onClick={() => deleteIncome(inc.id)} className="text-red-400 hover:text-red-600 transition-colors">
                                                            <i className="fa-regular fa-trash-can"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            const ExpenseView = () => (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="lg:col-span-1">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 sticky top-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">Add Recurrent Expense</h3>
                            <form onSubmit={addExpense} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Expense Name</label>
                                    <input required name="name" type="text" placeholder="e.g., Electricity Bill" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Amount (RON)</label>
                                    <input required name="amount" type="number" min="0" step="1" placeholder="0" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                        <select name="category" className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500 bg-white text-sm">
                                            <option value="Housing">Housing</option>
                                            <option value="Utilities">Utilities</option>
                                            <option value="Food">Food</option>
                                            <option value="Transport">Transport</option>
                                            <option value="Entertainment">Fun</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Method</label>
                                        <select name="method" className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500 bg-white text-sm">
                                            <option value="Card">Card</option>
                                            <option value="Cash">Cash</option>
                                            <option value="Transfer">Transfer</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Due Date (Day of month)</label>
                                    <input name="dueDate" type="number" min="1" max="31" placeholder="e.g., 15" className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-turquoise-500" />
                                </div>
                                <div className="flex items-center mt-2">
                                    <input type="checkbox" id="reminder" name="reminder" className="w-4 h-4 text-turquoise-600 rounded border-gray-300 focus:ring-turquoise-500" />
                                    <label htmlFor="reminder" className="ml-2 text-sm text-gray-700">Set monthly reminder</label>
                                </div>
                                <button type="submit" className="w-full bg-turquoise-600 hover:bg-turquoise-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200 mt-4">
                                    <i className="fa-solid fa-plus mr-2"></i> Save Expense
                                </button>
                            </form>
                        </div>
                    </div>
                    <div className="lg:col-span-2">
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex justify-between items-center">
                                Monthly Expenses
                                <span className="bg-red-50 text-red-600 py-1 px-3 rounded-full text-sm font-medium">{formatMoney(totalExpenses)} Total</span>
                            </h3>
                            {expenses.length === 0 ? (
                                <div className="text-center py-10 text-gray-500">No expenses added yet.</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-gray-200 text-gray-500 text-sm">
                                                <th className="pb-3 font-medium">Expense</th>
                                                <th className="pb-3 font-medium">Category</th>
                                                <th className="pb-3 font-medium">Due Date</th>
                                                <th className="pb-3 font-medium text-right">Amount</th>
                                                <th className="pb-3 font-medium text-center">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {expenses.map(exp => (
                                                <tr key={exp.id} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                                    <td className="py-4">
                                                        <p className="font-medium text-gray-800 flex items-center gap-2">
                                                            {exp.name}
                                                            {exp.reminder && <i className="fa-solid fa-bell text-amber-400 text-xs" title="Reminder Active"></i>}
                                                        </p>
                                                        <p className="text-xs text-gray-400">{exp.method}</p>
                                                    </td>
                                                    <td className="py-4">
                                                        <span className="text-xs px-2 py-1 rounded-md bg-gray-100 text-gray-600">
                                                            {exp.category}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 text-sm text-gray-600">
                                                        {exp.dueDate ? `Day ${exp.dueDate}` : '-'}
                                                    </td>
                                                    <td className="py-4 text-right font-semibold text-gray-800">{formatMoney(exp.amount)}</td>
                                                    <td className="py-4 text-center">
                                                        <button onClick={() => deleteExpense(exp.id)} className="text-red-400 hover:text-red-600 transition-colors">
                                                            <i className="fa-regular fa-trash-can"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            // --- Layout ---
            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="bg-turquoise-600 text-white shadow-md sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 p-2 rounded-lg">
                                    <i className="fa-solid fa-wallet text-xl"></i>
                                </div>
                                <h1 className="text-xl font-bold tracking-tight">Family Monthly Cost Management Apps</h1>
                            </div>
                            <div className="hidden sm:block text-sm bg-white/10 px-3 py-1.5 rounded-full font-medium">
                                Currency: RON
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        {/* Navigation Tabs */}
                        <div className="flex space-x-2 bg-white p-1 rounded-xl shadow-sm w-full md:w-max mb-8 border border-gray-100">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-turquoise-50 text-turquoise-700 shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}
                            >
                                <i className="fa-solid fa-chart-pie mr-2"></i> Dashboard
                            </button>
                            <button 
                                onClick={() => setActiveTab('incomes')}
                                className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'incomes' ? 'bg-turquoise-50 text-turquoise-700 shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}
                            >
                                <i className="fa-solid fa-arrow-down mr-2"></i> Incomes
                            </button>
                            <button 
                                onClick={() => setActiveTab('expenses')}
                                className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === 'expenses' ? 'bg-turquoise-50 text-turquoise-700 shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}
                            >
                                <i className="fa-solid fa-arrow-up mr-2"></i> Expenses
                            </button>
                        </div>

                        {/* Dynamic Content */}
                        {activeTab === 'dashboard' && <DashboardView />}
                        {activeTab === 'incomes' && <IncomeView />}
                        {activeTab === 'expenses' && <ExpenseView />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
